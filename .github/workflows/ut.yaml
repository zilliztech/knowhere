name: Unit Test

# This workflow is triggered on pushes or pull request to the repository.
on:
  push:
    branches:
      - main
  pull_request:
    # File paths to consider in the event. Optional; defaults to all.
    paths:
      - "include/**"
      - "python/**"
      - "src/**"
      - "thirdparty/**"
      - "benchmark/**"
      - "cmake/**"
      - "!cmake/libs/libcardinal.cmake"
      - ".github/workflows/ut.yaml"
      - "CMakeLists.txt"
      - "Makefile"
      - "conanfile.py"
      - "!**.md"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ut-linux:
    name: ut on ubuntu-22.04
    runs-on: self-hosted
    timeout-minutes: 120
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'none'
      - name: Install Dependency
        run: |
          bash scripts/install_deps.sh
          sudo pip3 install cmake==3.28.1
      - name: Restore Cache
        uses: ./.github/actions/cache-restore
        with:
          os: ubuntu-22.04
      - name: Build
        run: |
          make WITH_UT=True WITH_ASAN=True
          make test
      - name: Save Cache
        uses: ./.github/actions/cache-save
        with:
          os: ubuntu-22.04

  swig-build:
    name: python3 wheel
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'none'
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"
      - name: Install Dependency
        run: |
          bash scripts/install_deps.sh
          pip3 install pytest faiss-cpu
      - name: Install GCC 12
        # GCC 11 (ubuntu-22.04 default) has incomplete C++20 support:
        # std::partial_ordering, std::strong_ordering, std::weak_ordering
        # from <compare> are not available, causing abseil build failures.
        # Installed after install_deps.sh so bfloat16 builds with GCC 11
        # (bfloat16 fails on GCC 12 due to missing #include <memory>).
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 120
          conan profile detect --force
      - name: Restore Cache
        uses: ./.github/actions/cache-restore
        with:
          os: ubuntu-22.04
      - name: Build
        run: |
          make
      - name: Save Cache
        uses: ./.github/actions/cache-save
        with:
          os: ubuntu-22.04
      - name: Build Portable Wheel
        run: |
          cd python && ./build_portable_wheel.sh
      - name: Install Wheel
        run: |
          cd python && pip3 install dist/*-manylinux*.whl
      - name: Test
        run: |
          pytest tests/python/test_index_with_random.py
