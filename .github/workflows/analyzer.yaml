name: Analyzer

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyzer:
    name: analyzer
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'none'
      - name: Restore Cache
        uses: ./.github/actions/cache-restore
        with:
          os: ubuntu-22.04
      - name: Install GCC 12
        # GCC 11 (ubuntu-22.04 default) has incomplete C++20 support:
        # std::partial_ordering, std::strong_ordering, std::weak_ordering
        # from <compare> are not available, causing abseil build failures.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 120
      - name: Install Dependency
        run: bash scripts/install_deps.sh
      - name: Build & Analyzer
        run: |
          make WITH_UT=True \
          && find src -type f | grep -E "\.cc$" | xargs /usr/bin/run-clang-tidy-14.py -quiet -p=./build/Release
      - name: Save Cache
        uses: ./.github/actions/cache-save
        with:
          os: ubuntu-22.04
